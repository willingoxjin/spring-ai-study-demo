<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>智联聊伴 | 智能聊天机器人（支持Markdown）</title>
  <!-- 外部样式 -->
  <link rel="stylesheet" href="css/style.css">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Markdown 渲染库 -->
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js"></script>
  <!-- 代码高亮 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <!-- Vue 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
<div id="app">
  <div class="app-container">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <i class="fas fa-robot"></i>
        <h2>智能引擎</h2>
      </div>

      <div class="sidebar-spacer"></div>

      <!-- 底部控制区 -->
      <div class="sidebar-bottom">
        <button class="action-btn clear-chat-btn" @click="clearChat">
          <i class="fas fa-eraser"></i> 清空对话
        </button>
        <div class="control-group">
          <div class="switch-item">
            <div class="switch-label">
              <i class="fas fa-globe"></i>
              <span>联网搜索</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" v-model="webEnabled">
              <span class="slider round"></span>
            </label>
          </div>
          <div class="switch-item">
            <div class="switch-label">
              <i class="fas fa-database"></i>
              <span>知识库搜索</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" v-model="kbEnabled">
              <span class="slider round"></span>
            </label>
          </div>
        </div>
      </div>

      <div class="sidebar-footer">
        <i class="fas fa-microchip"></i> 智联聊伴 · 支持联网/知识库
      </div>
    </aside>

    <!-- 主聊天区域 -->
    <main class="chat-main">
      <div class="chat-header">
        <div class="header-info">
          <i class="fas fa-comment-dots"></i>
          <span>AI 对话伙伴</span>
        </div>
        <div class="mode-indicators">
          <span :class="['indicator', webEnabled ? 'on' : 'off']">
            <i class="fas fa-globe"></i> 联网{{ webEnabled ? '开启' : '关闭' }}
          </span>
          <span :class="['indicator', kbEnabled ? 'on' : 'off']">
            <i class="fas fa-database"></i> 知识库{{ kbEnabled ? '开启' : '关闭' }}
          </span>
        </div>
      </div>

      <div class="chat-messages" ref="chatMessages">
        <div v-for="(msg, idx) in messages" :key="idx" :class="['message', msg.role === 'user' ? 'user-message' : 'bot-message']">
          <div class="avatar" :class="msg.role === 'user' ? 'user-avatar' : 'bot-avatar'">
            <i :class="msg.role === 'user' ? 'fas fa-user' : 'fas fa-robot'"></i>
          </div>
          <div class="message-bubble" v-html="formatMessage(msg.content)"></div>
        </div>
        <div v-if="isThinking" class="message bot-message">
          <div class="avatar bot-avatar"><i class="fas fa-robot"></i></div>
          <div class="message-bubble"><i class="fas fa-spinner fa-pulse"></i> 思考中...</div>
        </div>
      </div>

      <div class="chat-input-area">
        <div class="input-wrapper">
          <textarea ref="textareaRef" v-model="inputMessage" @keydown="onKeydown" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
          <button class="send-btn" @click="sendMessage"><i class="fas fa-paper-plane"></i> 发送</button>
        </div>
        <div class="input-tips">
          <i class="fas fa-lightbulb"></i> 开启联网搜索获得实时信息
        </div>
      </div>
    </main>
  </div>
</div>

<!-- 外部脚本 -->
<script src="js/index.js"></script>
</body>
</html>
